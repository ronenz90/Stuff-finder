name: Product Scan

on:
  schedule:
    # כל שעה בדקה 15. לסריקה יומית החלף ל: '15 6 * * *' (06:15 UTC = 09:15 שעון ישראל)
    - cron: '15 * * * *'
  workflow_dispatch: {}   # מאפשר הרצה ידנית מכפתור "Run workflow"

permissions:
  contents: write         # כדי לשמור את found.json חזרה לריפו

concurrency:
  group: product-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scanner
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
          # אופציונלי — ספקי חיפוש נוספים (המערכת עובדת גם בלעדיהם):
          EBAY_CLIENT_ID: ${{ secrets.EBAY_CLIENT_ID }}
          EBAY_CLIENT_SECRET: ${{ secrets.EBAY_CLIENT_SECRET }}
          GOOGLE_CSE_KEY: ${{ secrets.GOOGLE_CSE_KEY }}
          GOOGLE_CSE_ID: ${{ secrets.GOOGLE_CSE_ID }}
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
          # כל ה-Secrets כ-JSON — לפענוח מפתחות מייל דינמיים (ALERT_EMAIL_xxx) שנוצרו מהממשק
          ALL_SECRETS: ${{ toJSON(secrets) }}
        run: python scanner.py

      - name: Commit results
        run: |
          git config user.name "product-tracker-bot"
          git config user.email "actions@github.com"
          git add found.json pending_review.json || true
          git diff --cached --quiet || git commit -m "🔎 Scan results $(date -u +'%Y-%m-%d %H:%M')"
          git pull --rebase origin main || true
          git push
